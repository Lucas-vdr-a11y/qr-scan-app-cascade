<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wachtwoord instellen - QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Baloo+Thambi+2:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-tertiary);
            padding: 24px;
        }

        .login-card {
            background: var(--bg-primary);
            padding: 32px;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-float);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            border-radius: var(--radius-input);
            font-family: inherit;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-button);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.9;
        }

        .error {
            background: var(--status-deny-bg);
            color: var(--status-deny);
            padding: 12px;
            border-radius: var(--radius-button);
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }

        .success {
            background: var(--status-allow-bg, #d1fae5);
            color: var(--status-allow, #065f46);
            padding: 16px;
            border-radius: var(--radius-button);
            font-size: 14px;
        }

        .success a {
            color: inherit;
            font-weight: 600;
        }

        .hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="/logo.png" alt="Rederij Cascade" class="brand-logo login-logo">
        <p>Stel je wachtwoord in om de QR Scanner te gebruiken</p>

        <div id="error-msg" class="error"></div>

        <form id="set-password-form">
            <div class="form-group">
                <label>Nieuw wachtwoord</label>
                <input type="password" name="password" required placeholder="Minimaal 8 tekens" minlength="8">
            </div>

            <div class="form-group">
                <label>Wachtwoord bevestigen</label>
                <input type="password" name="password_confirm" required placeholder="Herhaal je wachtwoord">
                <div class="hint">Minimaal 8 tekens</div>
            </div>

            <button type="submit" id="submit-btn">Wachtwoord instellen</button>
        </form>

        <div id="success-msg" style="display: none;">
            <div class="success">
                Wachtwoord ingesteld!<br>
                <a href="/login.html">Ga naar inloggen</a>
            </div>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const form = document.getElementById('set-password-form');
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');

        if (!token) {
            form.style.display = 'none';
            errorDiv.textContent = 'Geen geldige link. Vraag de beheerder om een nieuwe uitnodiging.';
            errorDiv.style.display = 'block';
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            errorDiv.style.display = 'none';

            const formData = new FormData(e.target);
            const password = formData.get('password');
            const confirm = formData.get('password_confirm');

            if (password !== confirm) {
                errorDiv.textContent = 'Wachtwoorden komen niet overeen';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'Wachtwoord moet minimaal 8 tekens zijn';
                errorDiv.style.display = 'block';
                return;
            }

            btn.innerHTML = 'Bezig...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const result = await res.json();

                if (res.ok) {
                    form.style.display = 'none';
                    successDiv.style.display = 'block';
                } else {
                    throw new Error(result.error || 'Er ging iets mis');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.innerHTML = 'Wachtwoord instellen';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
