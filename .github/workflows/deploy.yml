name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          # Trigger deploy — Coolify verwerkt dit async, we hoeven niet te wachten
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST \
            "http://187.124.176.167:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")

          echo "Coolify response: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered successfully"
          else
            echo "Deploy trigger returned $HTTP_CODE, retrying..."
            sleep 5
            curl -s -o /dev/null --max-time 30 \
              -X POST \
              "http://187.124.176.167:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json"
          fi
